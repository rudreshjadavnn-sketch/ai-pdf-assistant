<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | AI PDF Assistant</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">

            <div class="logo-box">
                AI
            </div>

            <h2>AI <span>PDF</span> Assistant</h2>

        </div>

        <h1>Login your account</h1>

        <p class="subtitle">
            Welcome Back
        </p>

        <form>

            <div class="input-group">

                <label>Email address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                >

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Create a password"
                >

            </div>

            <button
                type="button"
                onclick="login()"
            >
                Login
            </button>

        </form>

        <p class="bottom-text">

            New User?

            <a href="/register">
                Register
            </a>

        </p>

    </div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
